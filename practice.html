<!DOCTYPE html>
<html>
    <head>
        <meta charset UFT="8">
        <meta name="viewport" width="device-width" initial-scale="1.0">
        <title>music</title>
        <style>
            .audio{
                display: block;
                margin-bottom: 20px;
            }
            .submit{
                background-color: rgb(67, 67, 255);
                color: white;
                border-radius: 20px;
                cursor: pointer;
                font-size: large;
                display: block;
                margin-left: auto;
                margin-right: auto;
            
              
            }
            .submit:hover{
                box-shadow: 7px 7px 7px grey;
                transition: 0.7s;

            }
            
        </style>
    </head>
    <body>
        <audio controls height="10px" width="20px" class="audio">
            <source src="wavy.mp3" type="audio/mp3">
        </audio>

        <button class="submit">SUBMIT</button>
    </body>
</html>
